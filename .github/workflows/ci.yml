name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clients:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm -r run lint
      - run: pnpm -r run typecheck
      - run: pnpm -r run test
        env:
          NODE_OPTIONS: --max_old_space_size=4096

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: uv sync
      - name: Ensure dummy images dir for import
        run: |
          mkdir -p static/images
          printf 'x' > static/images/ci-dummy.jpg
          touch static/embeddings.jsonl
      - run: uv run black --check .
      - run: uv run flake8 .
      - run: uv run pytest -v
